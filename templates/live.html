{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h5 class="text-info mb-0">🔴 Live Alerts <span class="badge bg-danger">{{ alerts|length }}</span></h5>
  <small class="text-muted">Auto-refresh every 10s</small>
</div>

<div class="table-responsive">
  <table class="table table-dark table-hover table-sm">
    <thead>
      <tr>
        <th>Date</th>
        <th>Server</th>
        <th>Service</th>
        <th>User</th>
        <th>Source IP</th>
      </tr>
    </thead>
    <tbody>
      {% for a in alerts %}
      <tr>
        <td>{{ a.date }}</td>
        <td>{{ a.server }}</td>
        <td>{{ a.service }}</td>
        <td>{{ a.user }}</td>
        <td><code>{{ a.ip }}</code></td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}

{% block scripts %}
<script>setTimeout(() => location.reload(), 10000);</script>
{% endblock %}
